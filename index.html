<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xiaoyong (Eric) Liang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: "Signifier";
      src: url("fonts/signifier.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --background: #F5F4EF;
      --foreground: #000000;
      --muted-foreground: #686868;
      --link: #595959;
      --border: #403E37;
      --accent: #FBD45B;
      --font-sans: "Source Sans 3", Arial, sans-serif;
      --font-serif: "Signifier", Georgia, serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--background);
      color: var(--foreground);
    }

    body {
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.5;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @media (min-width: 768px) {
      body { padding: 48px; }
    }

    main {
      max-width: 768px;
      margin: 0 auto;
    }

    header {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 64px;
    }

    @media (min-width: 768px) {
      header { flex-direction: row; align-items: flex-start; }
    }

    .logo {
      font-family: var(--font-serif);
      font-weight: 400;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin: 0;
    }

    .logo .pi {
      display: inline-block;
      margin-left: -0.05em;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-family: var(--font-mono);
      font-size: 14px;
    }

    nav a {
      color: var(--foreground);
      text-decoration: underline;
      text-underline-offset: 8px;
      text-decoration-thickness: 1px;
    }

    nav a:hover {
      text-decoration-thickness: 2px;
    }

    section {
      margin: 48px 0;
    }

    section h2 {
      font-family: var(--font-serif);
      font-weight: 400;
      font-size: 36px;
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin: 0 0 16px;
    }

    .tagline {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--muted-foreground);
      margin: 8px 0 0;
    }

    .prose {
      font-family: var(--font-sans);
      font-size: 18px;
      line-height: 1.625;
    }

    .prose p { margin: 0 0 16px; }

    ul {
      font-family: var(--font-sans);
      font-size: 18px;
      line-height: 1.625;
      padding-left: 0;
      list-style: none;
    }

    ul li {
      padding: 12px 0;
      border-bottom: 1px solid rgba(64, 62, 55, 0.15);
    }

    ul li:last-child { border-bottom: none; }

    a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
    }

    a:hover { text-decoration-thickness: 2px; }

    .tag {
      display: inline-block;
      background: var(--accent);
      color: #111;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.025em;
      text-transform: uppercase;
      padding: 2px 6px;
      margin-left: 6px;
      vertical-align: middle;
    }

    footer {
      margin-top: 96px;
      padding-top: 24px;
      border-top: 1px solid rgba(64, 62, 55, 0.25);
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted-foreground);
    }

    .socials {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      justify-content: center;
    }

    @media (min-width: 768px) {
      .socials { justify-content: flex-end; }
    }

    .socials a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      color: var(--foreground);
      text-decoration: none;
      border: 1px solid rgba(64, 62, 55, 0.25);
      border-radius: 50%;
      transition: background 0.15s ease;
    }

    .socials a:hover {
      background: var(--accent);
    }

    .socials svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
  </style>
</head>

      <div class="prose">

    document.getElementById("year").textContent = new Date().getFullYear();
